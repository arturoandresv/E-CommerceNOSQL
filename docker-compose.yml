version: '3.8'
services:
  dynamodb_local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodblocal
    user: root
    restart: always
    ports:
      - "3000:8000"
    volumes:
      - dynamodb_local_volume:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    networks:
      - aws_network

  aws_cli:
    image: amazon/aws-cli:latest
    container_name: awscli
    stdin_open: true
    tty: true
    entrypoint: /bin/bash
    networks:
      - aws_network
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aws_network

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    restart: always
    ports:
      - "4566:4566"       # Gateway principal (todos los servicios)
      - "4510-4559:4510-4559"  # Puertos externos de servicios
    environment:
      - SERVICES=lambda,apigateway,iam,logs,s3
      - DEBUG=1
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
      - HOSTNAME_EXTERNAL=localstack
    volumes:
      - localstack_volume:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock  # necesario para Lambda con Docker
    networks:
      - aws_network

networks:
  aws_network:
    driver: bridge

volumes:
  dynamodb_local_volume:
  localstack_volume: